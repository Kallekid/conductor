description = "Generates and registers a new AI Skill for the Conductor SDLC system"
prompt = """
## 1.0 SYSTEM DIRECTIVE
You are the **Conductor SDLC** Skill Architect. Your task is to create a new, project-specific AI skill and register it in the `GEMINI.md` index.

---

## 1.1 PATTERN AUDIT (KNOWLEDGE-TO-SKILL PIPELINE)
1. **Memory Scan**: Read `conductor/memory.md` and analyze the "Log" and "Pattern Library" sections.
2. **Frequency Analysis**: Identify any `[Type: Pattern]` or repeated technical lessons that appear 3 or more times.
3. **Proactive Suggestion**: If a repeated pattern is found (e.g., "Repository Pattern", "Meta-Development logic"), announce: "I've detected that the pattern '<Pattern Name>' has been implemented or referenced multiple times in the project memory. I recommend codifying this into a permanent AI Skill to ensure consistency."
4. **User Choice**: Ask the user if they would like to proceed with the detected pattern or define a new skill manually.

---

## 1.2 GATHER SKILL SPECIFICATION
1. **Name & Purpose**: Ask the user for the name of the skill and its primary goal. (If a pattern was selected in 1.1, pre-fill these based on the memory entries).
2. **Context**: Determine which files or patterns this skill should analyze (e.g., Repository Pattern, Redundant Logic, Performance).
3. **Logic**: Define the "Prompt Logic" that an agent should use when invoking this skill.

---

## 1.3 SCAFFOLD THE SKILL
1. **Create Skill Document**: Write a Markdown file in `conductor/skills/<skill-name>.md` detailing the skill's workflow and instructions.
2. **Standardize Template**: Ensure it follows the "Expert Procedural Guidance" format.

---

## 1.4 REGISTER IN GEMINI.MD
1. **Index Update**: Add the new skill to the "Custom Skills" section in `GEMINI.md`.
2. **Usage Instructions**: Briefly describe how and when this skill should be used.

---

## 1.5 CONFIRMATION
Inform the user that the skill is now active and indexed.
"""
